<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | الرئيسية</title>

    <!-- ملف CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <img src="profile.png" class="profile" alt="Profile">

        <h2>BARAA</h2>
        <h2>لوحة الإدارة</h2>

        <ul>
            <li>
                <a href="index.html" class="active">
                    <i class="fa-solid fa-house"></i>
                    الرئيسية
                </a>
            </li>

            <li>
                <a href="users.html">
                    <i class="fa-solid fa-users"></i>
                    المستخدمين
                </a>
            </li>

            <li>
                <a href="settings.html">
                    <i class="fa-solid fa-gear"></i>
                    الإعدادات
                </a>
            </li>
        </ul>

    </aside>

    <!-- Main -->
    <main class="main-content">

        <header>
            <h1>مرحباً بك في لوحة التحكم</h1>
        </header>

        <div class="welcome">
            👋 أهلاً بك، نتمنى لك يوماً موفقاً.
        </div>

        <p id="date"></p>

        <section class="stats-grid">

            <div class="card">
                <h3>المستخدمين</h3>
                <p>1250</p>
            </div>

            <div class="card">
                <h3>المبيعات</h3>
                <p>$15,300</p>
            </div>

            <div class="card">
                <h3>الزيارات</h3>
                <p>45,000</p>
            </div>

            <div class="card">
                <h3>المشاريع</h3>
                <p>28</p>
            </div>

        </section>

        <footer>
            جميع الحقوق محفوظة © 2026 | BARAA
        </footer>

    </main>

</div>

<script>
document.getElementById("date").innerHTML =
"📅 تاريخ اليوم: " + new Date().toLocaleDateString('ar');
</script>

</body>
</html>
